name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk -v tag="$TAG" '
            /^## / {
              if (found) exit
              if ($0 ~ "^## \\[" tag "\\]" || $0 ~ "^## " tag) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > _notes.md
          echo "notes<<EOF" >> $GITHUB_ENV
          cat _notes.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t ghcr.io/tbk42/llamadeck:${{ github.ref_name }} .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Docker image
        run: |
          docker tag ghcr.io/tbk42/llamadeck:${{ github.ref_name }} ghcr.io/tbk42/llamadeck:latest
          docker push ghcr.io/tbk42/llamadeck:${{ github.ref_name }}
          docker push ghcr.io/tbk42/llamadeck:latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ env.notes }}
          generate_release_notes: false
