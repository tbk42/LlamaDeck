services:
  llamadeck:
    build: .
    container_name: llamadeck
    ports:
      - ${LLAMADECK_PORT:-11435}:${LLAMADECK_PORT:-11435}
    volumes:
      # Docker socket for discovering sibling Ollama containers.
      # Override DOCKER_SOCKET in .env for your platform:
      #   Linux / macOS:        /var/run/docker.sock
      #   Windows (Docker Desktop): //./pipe/docker_engine
      #   Windows (WSL):        /var/run/docker.sock
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro

      # Persist registered instances and config across restarts.
      - ./data:${LLAMADECK_CONFIG_DIR:-/data}

      # GGUF models directory — change the host path to match your setup.
      - ./GGUF-Models:/GGUF:ro

    environment:
      - LLAMADECK_CONFIG_DIR=${LLAMADECK_CONFIG_DIR:-/data}
      - LLAMADECK_HOST=${LLAMADECK_HOST:-0.0.0.0}
      - LLAMADECK_PORT=${LLAMADECK_PORT:-11435}
    restart: unless-stopped
