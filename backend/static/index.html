<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LlamaDeck</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1><span>Ollama</span> Model Manager</h1>
    <nav>
      <button data-page="models">Models</button>
      <button data-page="import">Import GGUF</button>
      <button data-page="pull">Pull</button>
      <button data-page="instances">Instances</button>
      <button data-page="gguf">GGUF Library</button>
    </nav>
  </header>

  <div class="instance-bar">
    <label for="instance-select">Instance:</label>
    <select id="instance-select"></select>
  </div>

  <main>
    <!-- Models -->
    <div id="page-models" class="page active">
      <h2>Models</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Family</th>
            <th>Params</th>
            <th>Quantization</th>
            <th>Size</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="models-tbody">
          <tr><td colspan="6" class="empty">Select an instance</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Import GGUF -->
    <div id="page-import" class="page">
      <h2>Import GGUF</h2>
      <form id="import-form" style="max-width: 500px;">
        <div class="form-group">
          <label>GGUF File</label>
          <input type="file" id="import-file" accept=".gguf" required>
        </div>
        <div class="form-group">
          <label>Model Name (auto-suggested)</label>
          <input type="text" id="import-name" placeholder="e.g. my-model">
        </div>
        <button type="submit" class="btn btn-primary">Import</button>
      </form>
    </div>

    <!-- Pull -->
    <div id="page-pull" class="page">
      <h2>Pull Models</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;">
          <h3>Ollama Registry</h3>
          <div class="form-group">
            <label>Model name (e.g. llama3.2:3b)</label>
            <input type="text" id="pull-registry-name" placeholder="llama3.2:3b">
          </div>
          <button class="btn btn-primary" onclick="pullRegistry()">Pull</button>
        </div>
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;">
          <h3>HuggingFace</h3>
          <div class="form-group">
            <label>Download URL</label>
            <input type="url" id="pull-hf-url" placeholder="https://huggingface.co/...">
          </div>
          <div class="form-group">
            <label>API Key (optional, for gated models)</label>
            <input type="password" id="pull-hf-token">
          </div>
          <button class="btn btn-primary" onclick="pullHuggingFace()">Pull</button>
        </div>
      </div>
    </div>

    <!-- Instances -->
    <div id="page-instances" class="page">
      <h2>Instances</h2>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button class="btn" onclick="showAddInstance()">+ Add Instance</button>
        <button class="btn" onclick="discoverInstances()">Auto-Discover</button>
      </div>
      <div id="instances-container" class="instance-list">
        <div class="empty">No instances registered</div>
      </div>
    </div>

    <!-- GGUF Library -->
    <div id="page-gguf" class="page">
      <h2>GGUF Library</h2>
      <p style="color:#8b949e;font-size:13px;margin-bottom:12px;">
        Browse local GGUF files and import them into Ollama.
      </p>
      <div id="gguf-container">
        <div class="empty">Select an instance to browse GGUF files</div>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
